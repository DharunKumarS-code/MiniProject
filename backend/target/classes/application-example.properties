server.port=8080

# MongoDB Configuration - Replace with your actual MongoDB cluster details
spring.data.mongodb.uri=mongodb+srv://username:password@cluster0.xxxxx.mongodb.net/eduwatch?retryWrites=true&w=majority
spring.data.mongodb.database=eduwatch

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*